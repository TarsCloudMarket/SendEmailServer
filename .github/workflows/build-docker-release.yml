name: build-docker-tag

on:
  push:
    tags:
      - v*
        
jobs:
  build:
    container: tarscloud/base-compiler
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          registry: docker.tarsyun.com
          username: ${{ secrets.name }}
          password: ${{ secrets.pass }}
      - name: Get version
        id: get_version
        run: echo "::set-output name=VERSION::${GITHUB_REF#refs/tags/}"
      - name: Cache node modules
        uses: actions/cache@v2
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
      - name: npm install
        run: npm install && npm run build
      - name: prepare nodejs package
        run: cp package.json build/ && cd build && npm install --production && cd .. 
      - name: prepare tars agent
        run: |
          mkdir /tmp/server
          mv build /tmp/server/
          rm -rf node_modules/ 
          cp -rf /tmp/server/build src/
          mkdir -p tars_nodejs
          npm install @tars/node-agent -g
          mv /usr/local/lib/node_modules/@tars/node-agent tars_nodejs/
      - name: build docker
        run: |
          exec-build-cloud.sh tarscloud/tars.nodejsbase nodejs . yaml/values.yaml ${{ steps.get_version.outputs.VERSION }} true
