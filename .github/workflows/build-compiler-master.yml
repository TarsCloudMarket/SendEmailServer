name: build-compiler-master

on:
  push:
    branches:
      - master 
  pull_request:
    branches:
      - master

jobs:
  build:
    container: tarscloud/base-compiler
    runs-on: ubuntu-20.04
    steps:
      - name: env
        run: env
      - uses: actions/checkout@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          registry: docker.tarsyun.com
          username: ${{ secrets.name }}
          password: ${{ secrets.pass }}
      - name: Cache node modules
        uses: actions/cache@v2
        env:
          cache-name: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
      - name: npm install
        run: npm install && npm run build
      - name: prepare nodejs package
        run: cp package.json build/ && cd build && npm install --production && cd ..
      - name: build docker
        run: |
          exec-build-cloud.sh tarscloud/tars.nodejsbase nodejs build yaml/values.yaml latest true