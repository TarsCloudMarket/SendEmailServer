
cloud:
  group: Base
  name: sendemailserver
  logo: assets/logo.png
  version: latest
  changelist: Changelist.md
  lang: nodejs
  description: >-
    Send mail service, call the tars interface to complete the mail sending.
  description_cn: >-
    发送邮件服务, 调用tars接口即可完成邮件的发送.
  collaborators:
    - ruanshudong@qq.com
  repository: https://github.com/TarsCloudMarket/SendEmailServer.git
  readme: README.en.md
  readme_cn: README.md
  protocols:
    - src/protocol/SendEmail.tars
  assets: 
    - assets
app: Base 
server: SendEmailServer
template: tars.nodejs
profile: ""
servants:
  - name: SendEmailObj
    port: 10000
    isTars: true
    isTcp: true
    thread: 3
    capacity: 100000
    connection: 10000
    timeout: 30000
replicas: 2
hostNetwork: false
hostIPC: false
hostPorts: []
repo:
  id:
  image: ruanshudong/base.sendemailserver
  secret: tars-image-secret
config:
  - name: config.json
    content: |
      {
        "email": {
            "smtp": {
                "host": "smtp.exmail.qq.com",
                "port": 465,
                "secure": true,
                "auth": {
                  "user": "",
                  "pass": ""
                }
            },
        },
      }