
app: Base 
server: SendEmailServer
template: tars.nodejs
profile: ""
servants:
  - name: SendEmailObj
    port: 10000
    isTars: true
    isTcp: true
    thread: 3
    capacity: 100000
    connection: 10000
    timeout: 30000
replicas: 2
hostNetwork: false
hostIPC: false
hostPorts: []
repo:
  id:
  image: ruanshudong/base.sendemailserver
  secret: tars-image-secret
config:
  - name: config.json
    content: |
      {
        "email": {
            "smtp": {
                "host": "smtp.exmail.qq.com",
                "port": 465,
                "secure": true,
                "auth": {
                  "user": "",
                  "pass": ""
                }
            },
        },
      }